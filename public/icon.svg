<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- warm linen background, softly lit from above -->
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#f4ecdf"/>
      <stop offset="58%" stop-color="#ece0cd"/>
      <stop offset="100%" stop-color="#e0d3bd"/>
    </radialGradient>
    <!-- the orb: a soft sphere lit from the upper-left -->
    <radialGradient id="orb" cx="40%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#fbecdd"/>
      <stop offset="34%" stop-color="#f4d8c2"/>
      <stop offset="70%" stop-color="#e6bca1"/>
      <stop offset="100%" stop-color="#d3a487"/>
    </radialGradient>
    <!-- a faint halo around the orb -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f3d8c4" stop-opacity="0.6"/>
      <stop offset="58%" stop-color="#f3d8c4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f3d8c4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- soft grounding shadow -->
  <ellipse cx="256" cy="376" rx="112" ry="20" fill="#b08e6e" opacity="0.15"/>

  <!-- halo -->
  <circle cx="256" cy="248" r="190" fill="url(#halo)"/>

  <!-- the orb -->
  <circle cx="256" cy="248" r="146" fill="url(#orb)"/>

  <!-- a gentle, blurred sheen to give the sphere life -->
  <ellipse cx="214" cy="198" rx="46" ry="34" fill="#fdf4ec" opacity="0.32" filter="url(#soft)"/>
</svg>
